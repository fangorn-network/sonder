fragment TrackFields on ManifestState {
  id
  owner
  schemaId
  schemaName
  manifestCid
  version
  lastUpdated
}

query GetTracks($first: Int!, $skip: Int!) {
  manifestStates(
    first: $first
    skip: $skip
    orderBy: lastUpdated
    orderDirection: desc
    where: { schemaId: "0x8d4f6bf05a8afde7ed7df74637712e32d0d8b1e24f741c1db416e6229cac8f6b" }
  ) {
    ...TrackFields
    manifest {
      files {
        name
        fileFields { name value atType acc pricing { price currency } }
      }
    }
  }
}

query SearchTracks($search: String!) {
  manifestStates(
    where: { schemaId: "0x8d4f6bf05a8afde7ed7df74637712e32d0d8b1e24f741c1db416e6229cac8f6b" }
    first: 100
  ) {
    ...TrackFields
    manifest {
      files {
        name
        fileFields { name value atType acc pricing { price currency } }
      }
    }
  }
}

query GetTracksByStateIds($ids: [Bytes!]!) {
  manifestStates(where: { id_in: $ids }, first: 1000) {
    id
    owner
    schemaName
    manifest {
      files {
        name
        fileFields {
          name
          value
          acc
        }
      }
    }
  }
}

query GetTracksByOwner($owner: Bytes!, $first: Int!, $skip: Int!) {
  manifestStates(
    where: {
      owner: $owner
      schemaId: "0x8d4f6bf05a8afde7ed7df74637712e32d0d8b1e24f741c1db416e6229cac8f6b"
    }
    first: $first
    skip: $skip
  ) {
    ...TrackFields
    manifest {
      files {
        name
        fileFields { name value atType acc pricing { price currency } }
      }
    }
  }
}

query GetTrack($id: ID!) {
  manifestState(id: $id) {
    ...TrackFields
    manifest {
      files {
        name
        fileFields { name value atType acc pricing { price currency } }
      }
    }
  }
}

query GetTrackByOwnerAndTitle($owner: Bytes!, $title: String!) {
  manifestStates(
    where: {
      owner: $owner
      schemaId: "0x8d4f6bf05a8afde7ed7df74637712e32d0d8b1e24f741c1db416e6229cac8f6b"
    }
    first: 10
  ) {
    ...TrackFields
    manifest {
      files {
        name
        fileFields { name value }
      }
    }
  }
}