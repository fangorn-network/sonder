fragment TrackFields on ManifestState {
  id
  owner
  schemaId
  schemaName
  manifestCid
  version
  lastUpdated
}

query GetTracks($first: Int!, $skip: Int!) {
  manifestStates(
    first: $first
    skip: $skip
    where: { schemaId: "0xf18e92dce6496a423a48614fac9fe93c549aa51c1a663f5cbe2233b0ea18081d" }
  ) {
    ...TrackFields
    manifest {
      files {
        tag
        fileFields {
          name
          value
          atType
          acc
          pricing {
            price
            currency
          }
        }
      }
    }
  }
}

query SearchTracks($search: String!) {
  manifestStates(
    where: { schemaId: "0xf18e92dce6496a423a48614fac9fe93c549aa51c1a663f5cbe2233b0ea18081d" }
    first: 100
  ) {
    ...TrackFields
    manifest {
      files {
        tag
        fileFields {
          name
          value
          atType
          acc
          pricing {
            price
            currency
          }
        }
      }
    }
  }
}

query GetTracksByArtist($artist: String!, $first: Int!, $skip: Int!) {
  manifestStates(
    where: { schemaId: "0xf18e92dce6496a423a48614fac9fe93c549aa51c1a663f5cbe2233b0ea18081d" }
    first: $first
    skip: $skip
  ) {
    ...TrackFields
    manifest {
      files {
        tag
        fileFields(where: { name: "artist", value: $artist }) {
          name
          value
        }
      }
    }
  }
}

