fragment TrackFields on ManifestState {
  id
  owner
  schemaId
  schemaName
  manifestCid
  version
  lastUpdated
}

query GetTracks($first: Int!, $skip: Int!) {
  manifestStates(
    first: $first
    skip: $skip
    orderBy: lastUpdated
    orderDirection: desc
    where: { schemaId: "0x7a69b1c49f16834707fe1d8bcc69ec485ea1b3c7bc68dd3ab81b05ec539952cd" }
  ) {
    ...TrackFields
    manifest {
      files {
        name
        fileFields { name value atType acc pricing { price currency } }
      }
    }
  }
}

query SearchTracks($search: String!) {
  manifestStates(
    where: { schemaId: "0x7a69b1c49f16834707fe1d8bcc69ec485ea1b3c7bc68dd3ab81b05ec539952cd" }
    first: 100
  ) {
    ...TrackFields
    manifest {
      files {
        name
        fileFields { name value atType acc pricing { price currency } }
      }
    }
  }
}

query GetTracksByOwner($owner: Bytes!, $first: Int!, $skip: Int!) {
  manifestStates(
    where: {
      owner: $owner
      schemaId: "0x7a69b1c49f16834707fe1d8bcc69ec485ea1b3c7bc68dd3ab81b05ec539952cd"
    }
    first: $first
    skip: $skip
  ) {
    ...TrackFields
    manifest {
      files {
        name
        fileFields { name value atType acc pricing { price currency } }
      }
    }
  }
}

query GetTrack($id: ID!) {
  manifestState(id: $id) {
    ...TrackFields
    manifest {
      files {
        name
        fileFields { name value atType acc pricing { price currency } }
      }
    }
  }
}

query GetTrackByOwnerAndTitle($owner: Bytes!, $title: String!) {
  manifestStates(
    where: {
      owner: $owner
      schemaId: "0x7a69b1c49f16834707fe1d8bcc69ec485ea1b3c7bc68dd3ab81b05ec539952cd"
    }
    first: 10
  ) {
    ...TrackFields
    manifest {
      files {
        name
        fileFields { name value }
      }
    }
  }
}