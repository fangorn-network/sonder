query GetTracksByOwner($owner: Bytes!, $first: Int!, $skip: Int!) {
  manifestStates(
    where: {
      owner: $owner
      schemaId: "0xf18e92dce6496a423a48614fac9fe93c549aa51c1a663f5cbe2233b0ea18081d"
    }
    first: $first
    skip: $skip
  ) {
    ...TrackFields
    manifest {
      files {
        tag
        fileFields {
          name
          value
          atType
          acc
          pricing {
            price
            currency
          }
        }
      }
    }
  }
}

query GetTrack($id: ID!) {
  manifestState(id: $id) {
    ...TrackFields
    manifest {
      files {
        tag
        fileFields {
          name
          value
          atType
          acc
          pricing {
            price
            currency
          }
        }
      }
    }
  }
}

query GetTrackByOwnerAndTitle($owner: Bytes!, $title: String!) {
  manifestStates(
    where: {
      owner: $owner
      schemaId: "0xf18e92dce6496a423a48614fac9fe93c549aa51c1a663f5cbe2233b0ea18081d"
    }
    first: 1
  ) {
    ...TrackFields
    manifest {
      files {
        tag
        fileFields(where: { name: "title", value: $title }) {
          name
          value
        }
      }
    }
  }
}
