server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy /facilitator → https://facilitator.fangorn.network
    location /facilitator/ {
        proxy_pass https://facilitator.fangorn.network/;
        proxy_ssl_server_name on;
        proxy_set_header Host facilitator.fangorn.network;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }

    location = /facilitator {
        return 301 /facilitator/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}