fragment TagFields on ManifestState {
  id
  owner
  schemaId
  schemaName
  manifestCid
  version
  lastUpdated
}

fragment TagManifestFields on ManifestState {
  manifest {
    files {
      name
      fileFields { name value atType }
    }
  }
}

query GetTags($first: Int!, $skip: Int!) {
  manifestStates(
    first: $first
    skip: $skip
    orderBy: lastUpdated
    orderDirection: desc
    where: { schemaId: "0x969f34ddaffa9a35c0092dd77cf2fab555fe88a551a435722fd0feca677c9a2b" }
  ) {
    ...TagFields
    ...TagManifestFields
  }
}

query GetAllTagsForSearch($first: Int!, $skip: Int!) {
  manifestStates(
    first: $first
    skip: $skip
    orderBy: lastUpdated
    orderDirection: desc
    where: { schemaId: "0x969f34ddaffa9a35c0092dd77cf2fab555fe88a551a435722fd0feca677c9a2b" }
  ) {
    ...TagFields
    ...TagManifestFields
  }
}

query GetTagsByStateIds($ids: [Bytes!]!) {
  manifestStates(where: { id_in: $ids }, first: 1000) {
    ...TagFields
    ...TagManifestFields
  }
}

query GetTagsByOwner($owner: Bytes!, $first: Int!, $skip: Int!) {
  manifestStates(
    where: {
      owner: $owner
      schemaId: "0x969f34ddaffa9a35c0092dd77cf2fab555fe88a551a435722fd0feca677c9a2b"
    }
    first: $first
    skip: $skip
    orderBy: lastUpdated
    orderDirection: desc
  ) {
    ...TagFields
    ...TagManifestFields
  }
}

query GetTag($id: ID!) {
  manifestState(id: $id) {
    ...TagFields
    ...TagManifestFields
  }
}