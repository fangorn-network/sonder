fragment TrackFields on ManifestState {
  id
  owner
  schemaId
  schemaName
  manifestCid
  version
  lastUpdated
}

query GetTracks($first: Int!, $skip: Int!) {
  manifestStates(
    first: $first
    skip: $skip
    where: { schemaId: "0xe6ed6e175ef6277d28ef468c7c9b9be6c79d337e6c642d65a877b145fabd0d1a" }
  ) {
    ...TrackFields
    manifest {
      files {
        name
        fileFields { name value atType acc pricing { price currency } }
      }
    }
  }
}

query SearchTracks($search: String!) {
  manifestStates(
    where: { schemaId: "0xe6ed6e175ef6277d28ef468c7c9b9be6c79d337e6c642d65a877b145fabd0d1a" }
    first: 100
  ) {
    ...TrackFields
    manifest {
      files {
        name
        fileFields { name value atType acc pricing { price currency } }
      }
    }
  }
}

query GetTracksByOwner($owner: Bytes!, $first: Int!, $skip: Int!) {
  manifestStates(
    where: {
      owner: $owner
      schemaId: "0xe6ed6e175ef6277d28ef468c7c9b9be6c79d337e6c642d65a877b145fabd0d1a"
    }
    first: $first
    skip: $skip
  ) {
    ...TrackFields
    manifest {
      files {
        name
        fileFields { name value atType acc pricing { price currency } }
      }
    }
  }
}

query GetTrack($id: ID!) {
  manifestState(id: $id) {
    ...TrackFields
    manifest {
      files {
        name
        fileFields { name value atType acc pricing { price currency } }
      }
    }
  }
}

query GetTrackByOwnerAndTitle($owner: Bytes!, $title: String!) {
  manifestStates(
    where: {
      owner: $owner
      schemaId: "0xe6ed6e175ef6277d28ef468c7c9b9be6c79d337e6c642d65a877b145fabd0d1a"
    }
    first: 10
  ) {
    ...TrackFields
    manifest {
      files {
        name
        fileFields { name value }
      }
    }
  }
}