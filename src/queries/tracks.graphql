fragment TagFields on ManifestState {
  id
  owner
  schemaId
  schemaName
  manifestCid
  version
  lastUpdated
}

fragment TagManifestFields on ManifestState {
  manifest {
    files {
      name
      fileFields { name value atType }
    }
  }
}

query GetTags($first: Int!, $skip: Int!) {
  manifestStates(
    first: $first
    skip: $skip
    orderBy: lastUpdated
    orderDirection: desc
    where: { schemaId: "0xd5033de283848b81aec6be7d9dde6ec878ec0b8ee7ad78321072e4b06877fa6d" }
  ) {
    ...TagFields
    ...TagManifestFields
  }
}

query GetAllTagsForSearch($first: Int!, $skip: Int!) {
  manifestStates(
    first: $first
    skip: $skip
    orderBy: lastUpdated
    orderDirection: desc
    where: { schemaId: "0xd5033de283848b81aec6be7d9dde6ec878ec0b8ee7ad78321072e4b06877fa6d" }
  ) {
    ...TagFields
    ...TagManifestFields
  }
}

query GetTagsByStateIds($ids: [Bytes!]!) {
  manifestStates(where: { id_in: $ids }, first: 1000) {
    ...TagFields
    ...TagManifestFields
  }
}

query GetTagsByOwner($owner: Bytes!, $first: Int!, $skip: Int!) {
  manifestStates(
    where: {
      owner: $owner
      schemaId: "0xd5033de283848b81aec6be7d9dde6ec878ec0b8ee7ad78321072e4b06877fa6d"
    }
    first: $first
    skip: $skip
    orderBy: lastUpdated
    orderDirection: desc
  ) {
    ...TagFields
    ...TagManifestFields
  }
}

query GetTag($id: ID!) {
  manifestState(id: $id) {
    ...TagFields
    ...TagManifestFields
  }
}