# electron-builder.yml
appId: com.sond3r.app
productName: sond3r
directories:
  buildResources: build
files:
  - out/**
  - '!out/renderer/**'
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!vectordb/**'
  - '!**/node_modules/.pnpm/**'
  - '!**/node_modules/.cache/**'
asar: true
asarUnpack:
  - resources/**
  - '**/node_modules/@fangorn-network/**'
extraResources:
  - from: "vectordb/dist/${os}/"
    to: ""
    filter: ["server*"]
  - from: "out/renderer"
    to: "renderer"
  - from: ".env"
    to: ".env"
  - from: "resources/bin/${os}/"
    to: "bin"
    filter: ["yt-dlp*"]
  - from: "resources/qdrant/${os}/"
    to: "qdrant"
    filter: ["qdrant*"]
win:
  executableName: SOND3R
  target:
    - target: portable
      arch: [x64]
  artifactName: ${name}.${ext}
  # Azure Trusted Signing. electron-builder installs the `TrustedSigning`
  # PowerShell module on the runner and signs via `Invoke-TrustedSigning`,
  # authenticating through Microsoft Entra ID env vars set in CI:
  # AZURE_TENANT_ID / AZURE_CLIENT_ID / AZURE_CLIENT_SECRET (a service principal
  # holding the "Trusted Signing Certificate Profile Signer" role).
  # The four values below are NOT secrets and belong in source control.
  azureSignOptions:
    endpoint: https://scus.codesigning.azure.net/ 
    codeSigningAccountName: SOND3R
    certificateProfileName: prod-signing
    publisherName: Fangorn

mac:
  executableName: SOND3R
  target:
    - target: dmg
  artifactName: ${name}-${arch}.${ext}

linux:
  target:
    - AppImage

appImage:
  artifactName: ${name}.${ext}
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
npmRebuild: false
nodeGypRebuild: false
detectUpdateChannel: false
publish:
  provider: github
  owner: fangorn-network
  repo: sonder
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/