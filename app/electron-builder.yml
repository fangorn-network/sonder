# electron-builder.yml
appId: com.sond3r.app
productName: sond3r
directories:
  buildResources: build
files:
  - out/**
  - '!out/renderer/**'
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!vectordb/**'
  - '!**/node_modules/.pnpm/**'
  - '!**/node_modules/.cache/**'
asar: true
asarUnpack:
  - resources/**
  - '**/node_modules/@fangorn-network/**'
extraResources:
  - from: "vectordb/dist/${os}/"
    to: ""
    filter: ["server*"]
  - from: "out/renderer"
    to: "renderer"
  - from: ".env"
    to: ".env"
  - from: "resources/bin/${os}/"
    to: "bin"
    filter: ["yt-dlp*"]
  - from: resources/qdrant
    to: qdrant
  - from: resources/bin
    to: bin
win:
  executableName: SOND3R
  target:
    - target: portable
      arch: [x64]
  artifactName: ${name}.${ext}

mac:
  executableName: SOND3R
  target:
    - target: dmg
  artifactName: ${name}-${arch}.${ext}

linux:
  target:
    - AppImage
    - deb
    - snap

appImage:
  artifactName: ${name}.${ext}
deb:
  artifactName: ${name}_${arch}.${ext}
snap:
  artifactName: ${name}_${arch}.${ext}
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
npmRebuild: false
nodeGypRebuild: false
detectUpdateChannel: false
publish:
  provider: github
  owner: fangorn-network
  repo: sonder
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/