# ─────────────────────────────────────────────────────────────────────────────
# Fragments
# ─────────────────────────────────────────────────────────────────────────────

fragment TrackFields on ManifestState {
  id
  owner
  schemaName
  manifestCid
  version
  lastUpdated
  manifest {
    files {
      fields {
        name
        value
        atType
        acc
        pricing {
          price
          currency
        }
      }
    }
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# Get a paginated list of all music tracks
# ─────────────────────────────────────────────────────────────────────────────

query GetTracks($first: Int!, $skip: Int!) {
  manifestStates(
    first: $first
    skip: $skip
    where: { schema_: { name: "fangorn.music.test.v3" } }
  ) {
    ...TrackFields
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# Search tracks by artist, title, album, or genre
# ─────────────────────────────────────────────────────────────────────────────

query SearchTracks($search: String!) {
  byArtist: fileFields(
    where: { name: "artist", value_contains_nocase: $search }
    first: 50
  ) {
    manifestState {
      ...TrackFields
    }
  }

  byTitle: fileFields(
    where: { name: "title", value_contains_nocase: $search }
    first: 50
  ) {
    manifestState {
      ...TrackFields
    }
  }

  byAlbum: fileFields(
    where: { name: "album", value_contains_nocase: $search }
    first: 50
  ) {
    manifestState {
      ...TrackFields
    }
  }

  byGenre: fileFields(
    where: { name: "genre", value_contains_nocase: $search }
    first: 50
  ) {
    manifestState {
      ...TrackFields
    }
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# Get all tracks by a specific artist (exact match)
# ─────────────────────────────────────────────────────────────────────────────

query GetTracksByArtist($artist: String!, $first: Int!, $skip: Int!) {
  fileFields(
    where: { name: "artist", value: $artist }
    first: $first
    skip: $skip
  ) {
    manifestState {
      ...TrackFields
    }
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# Get all tracks on a specific album
# ─────────────────────────────────────────────────────────────────────────────

query GetAlbumTracks($album: String!, $first: Int!, $skip: Int!) {
  fileFields(
    where: { name: "album", value: $album }
    first: $first
    skip: $skip
  ) {
    manifestState {
      ...TrackFields
    }
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# Get all tracks by genre
# ─────────────────────────────────────────────────────────────────────────────

query GetTracksByGenre($genre: String!, $first: Int!, $skip: Int!) {
  fileFields(
    where: { name: "genre", value_contains_nocase: $genre }
    first: $first
    skip: $skip
  ) {
    manifestState {
      ...TrackFields
    }
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# Get all tracks owned by a specific address
# ─────────────────────────────────────────────────────────────────────────────

query GetTracksByOwner($owner: Bytes!, $first: Int!, $skip: Int!) {
  manifestStates(
    where: {
      owner: $owner
      schema_: { name: "fangorn.music.test.v3" }
    }
    first: $first
    skip: $skip
  ) {
    ...TrackFields
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# Get a single track by owner + title
# ─────────────────────────────────────────────────────────────────────────────

query GetTrack($owner: Bytes!, $title: String!) {
  fileFields(
    where: { name: "title", value: $title }
    first: 1
  ) {
    manifestState {
      ...TrackFields
    }
  }
}